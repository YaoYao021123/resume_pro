services:
  web:
    build: .
    container_name: resume-web
    restart: unless-stopped
    volumes:
      - resume-data:/opt/resume/data
      - resume-output:/opt/resume/output
    env_file:
      - path: .env.production
        required: false
    ports:
      - "8765:8765"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8765/')"]
      interval: 30s
      timeout: 5s
      retries: 3

  nginx:
    image: nginx:alpine
    container_name: resume-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - web

  # Enable with: docker compose --profile with-auth up
  auth:
    build: .
    container_name: resume-auth
    restart: unless-stopped
    command: ["python3", "-m", "uvicorn", "backend.auth_billing_service.main:app", "--host", "0.0.0.0", "--port", "8080"]
    env_file:
      - path: .env.production
        required: false
    ports:
      - "8080:8080"
    profiles:
      - with-auth

volumes:
  resume-data:
  resume-output:
