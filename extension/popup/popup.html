<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resume Quick Panel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <!-- Toast -->
  <div id="toast" class="toast hidden"></div>

  <div class="header">
    <div>
      <h1>Resume Quick Panel</h1>
    </div>
    <div class="header-actions">
      <button id="floatBtn" class="btn btn-sm" title="浮窗模式">浮窗</button>
      <button id="refreshBtn" class="btn btn-sm" title="刷新简历列表">刷新</button>
    </div>
  </div>

  <!-- Float controls (visible in floating window mode) -->
  <div id="floatControls" class="float-controls hidden">
    <label class="float-label">透明度</label>
    <input id="opacitySlider" type="range" min="30" max="100" value="100" class="opacity-slider">
    <span id="opacityVal" class="float-label">100%</span>
  </div>

  <div class="server-row">
    <input id="serverUrl" class="input" value="http://localhost:8765">
    <button id="saveServerBtn" class="btn btn-sm">保存</button>
  </div>
  <div class="status" id="statusText">准备中...</div>

  <!-- Version selector -->
  <div class="version-selector">
    <select id="versionSelect" class="version-select">
      <option value="">选择简历版本...</option>
    </select>
  </div>

  <div id="editorView" class="hidden">
    <div class="card">
      <div class="card-title">基础信息（快速填写）</div>
      <div class="grid-3">
        <input id="basicName" class="input" placeholder="姓名">
        <input id="basicEmail" class="input" placeholder="邮箱">
        <input id="basicPhone" class="input" placeholder="电话">
      </div>
      <div class="hint">这里用于快速记录，不会覆盖主简历文件</div>
    </div>

    <div class="card">
      <div class="card-title">自定义信息（不写入简历）</div>
      <div id="extraList"></div>
      <div class="btn-row">
        <button id="addExtraBtn" class="btn btn-sm">+ 添加</button>
        <button id="copyExtraBtn" class="btn btn-sm">复制自定义信息</button>
        <button id="saveMetaBtn" class="btn btn-sm">保存</button>
      </div>
    </div>

    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <div class="card-title" style="margin-bottom:0">简历内容（点击复制）</div>
        <button id="copyAllBtn" class="btn btn-sm">复制全部</button>
      </div>
      <div id="resumeSections"></div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
